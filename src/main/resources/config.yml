# DurumiBridge Configuration
# Bridge between DurumiTown (두루미마을) and the community website

# HTTP API Server Settings
api:
  port: 8080
  # API key for admin endpoints (announcements management)
  # CHANGE THIS to a secure random string!
  api-key: "CHANGE-ME-TO-A-SECURE-KEY"

# CORS Settings
cors:
  allowed-origins:
    - "http://localhost:3000"
    - "https://durumi-town.vercel.app"

# Website Sync (Push-based)
sync:
  enabled: true
  url: "https://durumi-town.vercel.app/api/sync"
  secret: "durumiBabo"
  interval: 30  # seconds

# Database Settings
database:
  # Path to SQLite database file (relative to plugin data folder)
  path: "durumi.db"
